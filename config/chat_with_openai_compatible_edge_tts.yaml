      Volcengine_TTS:
        enabled: True
        module: tts/volcengine_tts/tts_handler_volcengine
        voice: "zh_female_vv_uranus_bigtts"
        resource_id: "seed-tts-2.0"
        app_id: "5044958674"
        access_token: "hEhGD9nEoCmqz2u3mGTPyz8Wr3zZAoZ_"
        sample_rate: 24000
        audio_format: "pcm"
        chunk_flush_bytes: 8000
      LLMOpenAICompatible:
        enabled: True
        module: llm/openai_compatible/llm_handler_openai_compatible
